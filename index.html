<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OpenYap Launcher · Wangan OS</title>
<meta name="theme-color" content="#000000">
<link rel="icon" href="cars/20.png">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "outline": "#849495",
        "primary": "#dbfcff",
        "primary-container": "#00f0ff",
        "secondary-container": "#ff4b89",
        "tertiary-container": "#33fb0a",
        "surface": "#131315",
        "surface-container": "#201f21",
        "surface-container-low": "#1b1b1d",
        "surface-container-high": "#2a2a2c",
        "surface-bright": "#39393b",
        "surface-container-lowest": "#0e0e10",
        "on-surface": "#e5e1e4",
        "on-surface-variant": "#b9cacb",
        "on-background": "#e5e1e4",
        "outline-variant": "#3b494b",
        "background": "#131315",
        "surface-tint": "#00dbe9"
      },
      borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
      spacing: { unit: "4px", gutter: "16px", "panel-padding": "20px", margin: "28px" },
      fontFamily: {
        "body-lg": ["Inter"], "headline-lg": ["Space Grotesk"],
        "label-caps": ["Space Grotesk"], "data-mono": ["Space Grotesk"], "headline-md": ["Space Grotesk"]
      },
      fontSize: {
        "body-lg": ["18px", { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" }],
        "headline-lg": ["44px", { lineHeight: "1.1", letterSpacing: "-0.04em", fontWeight: "700" }],
        "label-caps": ["11px", { lineHeight: "1", letterSpacing: "0.2em", fontWeight: "700" }],
        "data-mono": ["13px", { lineHeight: "1.4", letterSpacing: "0.08em", fontWeight: "500" }],
        "headline-md": ["22px", { lineHeight: "1.15", letterSpacing: "-0.02em", fontWeight: "700" }]
      },
      backgroundImage: {
        'tach-glow': 'radial-gradient(circle at right center, rgba(0,240,255,0.15) 0%, transparent 60%)'
      }
    }
  }
}
</script>
<style>
  body {
    background-color: #000000;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,240,255,0.03) 1px, rgba(0,240,255,0.03) 2px),
      repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(0,240,255,0.03) 1px, rgba(0,240,255,0.03) 2px);
    background-size: 64px 64px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .carbon-panel {
    background-color: #1A1A1D;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 4px),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 4px);
  }
  .neon-border {
    box-shadow: 0 0 10px rgba(0,240,255,0.3), inset 0 0 5px rgba(0,240,255,0.2);
    border: 1px solid rgba(0,240,255,0.5);
  }
  .hud-glass {
    background: rgba(26,26,29,0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .btn-dual-tone {
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    transition: all 0.2s ease-in-out;
  }
  .card-glow { transition: all .25s ease-in-out; }
  .card-glow:hover {
    box-shadow: 0 0 24px rgba(0,240,255,0.35);
    border-color: #00f0ff;
    transform: translateY(-2px);
  }
  .card-car {
    position: absolute;
    right: -16px;
    bottom: 24px;
    width: 220px;
    opacity: 0.12;
    pointer-events: none;
    transition: opacity .3s ease, transform .5s cubic-bezier(.16,1,.3,1), right .4s ease;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 18px rgba(0,240,255,0.25));
    z-index: 2;
  }
  .card-glow:hover .card-car {
    opacity: 0.30;
    transform: translateX(-8px) scale(1.05);
  }

  /* Flyby cars — keep the charm */
  .flyby {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 20px rgba(0,240,255,0.3));
  }
  .flyby-1 { top: 18%; left: -240px; width: 180px; animation: fly1 14s linear infinite; animation-delay: -3s; opacity: 0.45; }
  .flyby-2 { top: 64%; right: -240px; width: 210px; animation: fly2 18s linear infinite; animation-delay: -7s; opacity: 0.35; transform: scaleX(-1); }
  .flyby-3 { top: 45%; left: -220px; width: 160px; animation: fly1 22s linear infinite; animation-delay: -11s; opacity: 0.3; }
  @keyframes fly1 {
    0% { transform: translateX(0); }
    100% { transform: translateX(calc(100vw + 300px)); }
  }
  @keyframes fly2 {
    0% { transform: scaleX(-1) translateX(0); }
    100% { transform: scaleX(-1) translateX(calc(100vw + 300px)); }
  }

  /* Status chip skew */
  .chip-skew { transform: skew(-15deg); }
  .chip-skew > span { display: inline-block; transform: skew(15deg); }

  /* Tachometer sweep animation for primary card */
  @keyframes tachSweep {
    0% { transform: rotate(-120deg); }
    100% { transform: rotate(120deg); }
  }
  .tach-needle {
    animation: tachSweep 3s cubic-bezier(.5,.1,.5,.9) infinite alternate;
    transform-origin: center;
  }

  /* Line clamp util (shouldn't need plugin) */
  .clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>
</head>
<body class="text-on-background min-h-screen flex flex-col font-['Inter'] text-[15px] relative">

<!-- Tachometer ambient glow -->
<div class="fixed top-0 right-0 w-[800px] h-full bg-tach-glow pointer-events-none z-[-1]"></div>

<!-- Flyby cars — preserved charm -->
<img src="cars/5.png" class="flyby flyby-1" alt="">
<img src="cars/120.png" class="flyby flyby-2" alt="">
<img src="cars/70.png" class="flyby flyby-3" alt="">

<!-- TopNavBar -->
<header class="bg-black/90 backdrop-blur-xl border-b-2 border-cyan-500/30 shadow-[0_4px_20px_rgba(0,0,0,0.9)] flex justify-between items-center w-full px-6 py-3 max-w-[100vw] z-50 sticky top-0">
  <div class="flex items-center gap-gutter">
    <img src="cars/20.png" alt="" class="h-7 w-auto" style="image-rendering:pixelated;filter:drop-shadow(0 0 6px rgba(0,240,255,0.5))">
    <span class="text-2xl font-black italic tracking-widest text-cyan-400 drop-shadow-[0_0_8px_rgba(0,240,255,0.6)] font-['Space_Grotesk']">OPENYAP</span>
    <div class="h-6 w-px bg-cyan-900/50 mx-2"></div>
    <nav class="hidden md:flex gap-gutter">
      <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1 font-bold transition-all font-['Space_Grotesk'] tracking-tighter uppercase text-sm" href="#">Dashboard</a>
      <a class="text-zinc-500 hover:text-cyan-300 transition-colors font-['Space_Grotesk'] tracking-tighter uppercase text-sm px-2" href="https://github.com/dyap123" target="_blank">Tuning</a>
      <a class="text-zinc-500 hover:text-cyan-300 transition-colors font-['Space_Grotesk'] tracking-tighter uppercase text-sm px-2" href="#">Diagnostics</a>
    </nav>
  </div>
  <div class="flex items-center gap-unit">
    <span class="hidden md:inline text-[10px] font-mono text-cyan-500/60 tracking-[0.2em] uppercase mr-3">// D.YAP // PROJECT_ENG</span>
    <button class="p-2 text-zinc-500 hover:bg-cyan-500/10 hover:text-cyan-300 transition-colors rounded" title="Settings">
      <span class="material-symbols-outlined">settings</span>
    </button>
    <button class="p-2 text-zinc-500 hover:bg-cyan-500/10 hover:text-cyan-300 transition-colors rounded" title="Standby">
      <span class="material-symbols-outlined">power_settings_new</span>
    </button>
  </div>
</header>

<main class="flex-grow container mx-auto px-gutter py-margin relative z-10 flex flex-col gap-margin pb-20">

  <!-- Hero header -->
  <div class="flex flex-col gap-2 border-l-4 border-primary-container pl-4 relative">
    <div class="absolute -left-[4px] top-0 h-1/2 w-1 bg-white opacity-50"></div>
    <h2 class="font-headline-lg text-headline-lg text-on-background uppercase italic tracking-tighter">Select Application</h2>
    <p class="font-label-caps text-label-caps text-primary-container tracking-[0.3em] opacity-80">アプリケーションを選択</p>
  </div>

  <!-- App Grid -->
  <div id="appGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter"></div>

</main>

<!-- Footer status bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-6 py-2 border-t border-cyan-500/20 bg-gradient-to-r from-black via-zinc-950 to-black shadow-[0_-10px_30px_rgba(0,240,255,0.05)] backdrop-blur-md">
  <div class="flex items-center gap-4">
    <span class="text-pink-500 font-black font-mono text-[10px] uppercase tracking-[0.2em]">SYSTEM_STATUS: OPTIMAL // WANGAN_OS_v4.2</span>
  </div>
  <div class="hidden md:flex gap-6">
    <span class="text-zinc-600 font-mono text-[10px] uppercase tracking-[0.2em]" id="timeStrip">LOCAL_TIME: --:--</span>
    <span class="text-zinc-600 font-mono text-[10px] uppercase tracking-[0.2em]">DRIVER: D.YAP</span>
    <span class="text-zinc-600 font-mono text-[10px] uppercase tracking-[0.2em]">MODE: ON_TRACK</span>
  </div>
</footer>

<script>
const APPS = [
  { n: '01', name: 'Command Center', jp: '指令室', icon: 'speed', car: '42.png',
    desc: 'Live construction dashboard — Alfred AI, embed tracking, pour lookahead, project health radar.',
    url: 'https://dyap123.github.io/openyap-cc/', status: 'ONLINE', version: 'CMD-4.2.1', last: '12H AGO', featured: true },
  { n: '02', name: 'CUP Dashboard', jp: '打設管理', icon: 'dashboard', car: '55.png',
    desc: 'Pour tracking, live pours via Firebase, embed checklists, footing maps, day log management.',
    url: 'https://dyap123.github.io/cup-dashboard/', status: 'ONLINE', version: 'PUR-2.8.0', last: '2H AGO' },
  { n: '03', name: 'Todo', jp: 'タスク管理', icon: 'checklist', car: '1.png',
    desc: 'Firebase task manager with RFIs tab, Sisyphus chart, Alfred brain, and satisfying completion chirp.',
    url: 'https://dyap123.github.io/openyap-todo/', status: 'ONLINE', version: 'TSK-3.1.0', last: '5M AGO' },
  { n: '04', name: 'Formwork', jp: '予算管理', icon: 'view_in_ar', car: '5.png',
    desc: 'Budget intelligence — line items, Compare view, 3D lattice, burn rate, runway. Excel export.',
    url: 'https://dyap123.github.io/openyap-budget/', status: 'ONLINE', version: 'FWK-2.0.0', last: '1D AGO' },
  { n: '05', name: 'Roadmap', jp: 'ロードマップ', icon: 'map', car: '150.png',
    desc: 'Business roadmap — 3D construction site, scroll-driven building, financials, WebGL shader bg.',
    url: 'https://dyap123.github.io/openyap-roadmap/', status: 'ONLINE', version: 'MAP-2.1.0', last: '5H AGO' },
  { n: '06', name: 'Roadmap · Stitch', jp: 'ロードマップ 試', icon: 'auto_awesome', car: '150.png',
    desc: 'Stitch-inspired restyle — neon wireframe building, Space Grotesk display, gradient border cards.',
    url: 'https://dyap123.github.io/openyap-roadmap/variant.html', status: 'UPDATE', version: 'MAP-V.BETA', last: '2D AGO' },
  { n: '07', name: 'Dashboard', jp: 'ダッシュボード', icon: 'space_dashboard', car: '88.png',
    desc: 'General OpenYap project dashboard — light/dark theme toggle and overview metrics.',
    url: 'https://dyap123.github.io/openyap-dashboard/', status: 'ONLINE', version: 'DSH-1.2.0', last: '1W AGO' },
  { n: '08', name: 'Family Trip', jp: '家族旅行', icon: 'flight_takeoff', car: '10.png',
    desc: 'California trip PWA — 21-person Singapore family. Schedule, logistics, food, budget.',
    url: 'https://dyap123.github.io/yap-family-trip/', status: 'ONLINE', version: 'TRP-1.0.3', last: '2D AGO' },
  { n: '09', name: 'Portfolio', jp: 'ポートフォリオ', icon: 'badge', car: '120.png',
    desc: 'Professional portfolio — OpenYap projects, construction field work, technical skills.',
    url: 'https://dyap123.github.io/portfolio/', status: 'ONLINE', version: 'PRT-1.0.0', last: '3D AGO' },
  { n: '10', name: 'Const Agent', jp: '建設AI', icon: 'smart_toy', car: '120.png',
    desc: 'AI construction PM with Alfred, agent pipeline, tool tracker, advisory team, web UI. Port 8484.',
    url: 'https://localhost:8484', status: 'LOCAL', version: 'AGT-4.7.0', last: 'NOW' },
  { n: '11', name: 'Vault Brain', jp: '知識庫', icon: 'hub', car: '70.png',
    desc: '3D knowledge vault — sprite-based nodes, Alfred chat, ElevenLabs voice, dual vault support.',
    url: 'http://localhost:8889', status: 'LOCAL', version: 'VLT-1.3.2', last: 'NOW' },
  { n: '12', name: 'Hand Lab', jp: '手の実験室', icon: 'pan_tool', car: '88.png',
    desc: 'Gesture-controlled vault brain — hand tracking, pinch to select, orbit with your palm.',
    url: 'http://localhost:8891', status: 'LOCAL', version: 'HND-0.4.0', last: '1D AGO' },
  { n: '13', name: 'Social', jp: 'ソーシャル', icon: 'podcasts', car: '100.png',
    desc: 'Social media manager — TikTok, YouTube Shorts, Instagram. Auto-clip, trending scraper, vault brain.',
    url: 'http://localhost:3000', status: 'LOCAL', version: 'SOC-0.7.1', last: '4D AGO' },
  { n: '14', name: 'Cost Codes', jp: 'コスト表', icon: 'qr_code_2', car: '20.png',
    desc: 'Foreman cost code reference — 11×17 print sheets, English + Spanish, editable code list, PCI fallback.',
    url: '../cost-codes/foreman-cost-codes.html', status: 'LOCAL', version: 'CST-1.0', last: 'TODAY' },
];

function statusStyle(status){
  if(status === 'ONLINE') return {
    bg: 'bg-primary-container', text: 'text-black', border: 'border-primary-container',
    iconBox: 'bg-primary-container/20 border-primary-container/40',
    iconColor: 'text-primary-container',
    btnBorder: 'border-primary-container', btnText: 'text-primary-container',
    btnHoverBg: 'group-hover:bg-primary-container group-hover:text-black',
    stripBorder: 'border-primary-container/20', stripColor: 'text-primary-container/70'
  };
  if(status === 'UPDATE') return {
    bg: 'bg-secondary-container', text: 'text-black', border: 'border-secondary-container',
    iconBox: 'bg-secondary-container/20 border-secondary-container/40',
    iconColor: 'text-secondary-container',
    btnBorder: 'border-secondary-container', btnText: 'text-secondary-container',
    btnHoverBg: 'group-hover:bg-secondary-container group-hover:text-black',
    stripBorder: 'border-secondary-container/20', stripColor: 'text-secondary-container/70'
  };
  if(status === 'LOCAL') return {
    bg: 'bg-tertiary-container', text: 'text-black', border: 'border-tertiary-container',
    iconBox: 'bg-tertiary-container/20 border-tertiary-container/40',
    iconColor: 'text-tertiary-container',
    btnBorder: 'border-tertiary-container', btnText: 'text-tertiary-container',
    btnHoverBg: 'group-hover:bg-tertiary-container group-hover:text-black',
    stripBorder: 'border-tertiary-container/20', stripColor: 'text-tertiary-container/70'
  };
  return {
    bg: 'bg-surface-bright', text: 'text-outline', border: 'border-outline/40',
    iconBox: 'bg-surface-bright border-outline/30',
    iconColor: 'text-outline',
    btnBorder: 'border-outline', btnText: 'text-outline',
    btnHoverBg: 'group-hover:bg-primary-container group-hover:text-black',
    stripBorder: 'border-surface-bright', stripColor: 'text-outline'
  };
}

function renderCard(app){
  const s = statusStyle(app.status);
  const featuredRing = app.featured ? 'neon-border' : `border ${app.status === 'ONLINE' ? 'border-primary-container/30' : 'border-surface-bright'}`;
  return `
    <a href="${app.url}" target="_blank" class="carbon-panel hud-glass ${featuredRing} rounded flex flex-col justify-between h-[280px] p-panel-padding card-glow relative group overflow-hidden transition-all no-underline">
      <!-- corner number -->
      <div class="absolute -right-6 -bottom-8 text-[110px] font-black text-white/[0.04] italic pointer-events-none group-hover:text-primary-container/[0.08] transition-colors select-none">${app.n}</div>
      <!-- car sprite -->
      <img src="cars/${app.car}" class="card-car" alt="">
      <!-- top row -->
      <div class="flex justify-between items-start z-10 relative">
        <div class="p-3 rounded border ${s.iconBox}">
          <span class="material-symbols-outlined text-3xl ${s.iconColor}" style="font-variation-settings:'FILL' 1;">${app.icon}</span>
        </div>
        <span class="chip-skew ${s.bg} ${s.text} font-label-caps text-label-caps px-3 py-1 rounded-sm"><span>${app.status}</span></span>
      </div>
      <!-- body -->
      <div class="z-10 mt-auto relative">
        <h3 class="font-headline-md text-headline-md text-white uppercase italic tracking-tighter mb-0.5">${app.name}</h3>
        <p class="font-data-mono text-[10px] tracking-[0.25em] mb-2 ${s.iconColor} opacity-70">${app.jp}</p>
        <p class="text-[12px] leading-snug text-outline mb-4 clamp-2">${app.desc}</p>
        <div class="btn-dual-tone w-full border ${s.btnBorder} ${s.btnText} font-label-caps text-label-caps py-3 tracking-[0.2em] uppercase bg-surface-container-low flex justify-center items-center gap-2 ${s.btnHoverBg}">
          LAUNCH <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
        </div>
      </div>
      <!-- telemetry strip -->
      <div class="absolute bottom-0 left-0 w-full bg-black/60 border-t ${s.stripBorder} py-1 px-3 flex justify-between items-center font-data-mono text-[9px] ${s.stripColor}">
        <span>${app.version}</span>
        <span>LAST: ${app.last}</span>
      </div>
    </a>`;
}

document.getElementById('appGrid').innerHTML = APPS.map(renderCard).join('');

// Live clock in footer
function tickClock(){
  const el = document.getElementById('timeStrip');
  if(!el) return;
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  el.textContent = `LOCAL_TIME: ${hh}:${mm}:${ss}`;
}
tickClock();
setInterval(tickClock, 1000);
</script>

</body></html>
